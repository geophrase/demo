name: Deploy Nginx Configuration

on:
  push:
    branches: [main]
    paths:
      - 'nginx/**'
      - '.github/workflows/deploy-nginx.yml'

permissions:
  contents: read

jobs:
  deploy-nginx:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy Nginx config to staging folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx/*.conf"
          target: "/home/iqbal/demo/nginx_temp/"
          strip_components: 1
          overwrite: true

      - name: Validate, Deploy, and Rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Removing any stale backup..."
            sudo rm -rf /etc/nginx/conf.d.backup

            echo "Creating backup of current configurations..."
            sudo cp -r /etc/nginx/conf.d /etc/nginx/conf.d.backup

            echo "Moving new files into place..."
            sudo cp /home/iqbal/demo/nginx_temp/*.conf /etc/nginx/conf.d/

            echo "Testing Nginx configuration..."
            if sudo nginx -t; then
                echo "Configuration valid! Reloading Nginx..."
                sudo systemctl reload nginx
                sudo rm -rf /etc/nginx/conf.d.backup
                rollback_failed=0
            else
                echo "ERROR: Configuration invalid! Initiating rollback..."
                sudo rm -rf /etc/nginx/conf.d
                sudo mv /etc/nginx/conf.d.backup /etc/nginx/conf.d
                rollback_failed=1
            fi

            echo "Cleaning up staging folder..."
            rm -rf /home/iqbal/demo/nginx_temp/

            if [ "$rollback_failed" -eq 1 ]; then
                echo "Rollback complete. Failing the GitHub Action pipeline."
                exit 1
            fi