name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'nginx/**'
      - '.github/workflows/deploy-nginx.yml'
      - 'README*'

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  GCP_REGION: asia-south1
  GCP_PROJECT: geophrase
  AR_REPO: demo
  IMAGE_NAME: nextjs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          # This maps your GitHub Secret to the Dockerfile ARG
          build-args: |
            GEOPHRASE_API_KEY=${{ secrets.GEOPHRASE_API_KEY }}
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Needed again in this job to access the files for SCP

      - name: Copy configuration and scripts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.production.yaml,deploy.sh"
          target: "/home/iqbal/demo"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/iqbal/demo
            # Ensure the script is executable after being copied
            chmod +x deploy.sh
            # Execute the script from the local directory
            ./deploy.sh ${{ needs.build-and-push.outputs.image_tag }}

      - name: Tag the deployment
        uses: actions/github-script@v9
        with:
          script: |
            const now = new Date();
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istDate = new Date(now.getTime() + istOffset);
            const timestamp = istDate.toISOString().slice(0, 19).replace(/[-T:]/g, '');
            const tag = `deploy-${timestamp}`;
            
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });